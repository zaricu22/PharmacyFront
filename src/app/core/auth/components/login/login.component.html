
<mat-card style="width: 40%; top: 50%; left: 50%; -ms-transform: translate(-50%, -50%); transform: translate(-50%, -50%);">
  <mat-card-header>
    <mat-card-title>Login</mat-card-title>
    <mat-card-subtitle>Fill form</mat-card-subtitle>
  </mat-card-header>
  <!-- Edit -->
  <form #myForm="ngForm" (ngSubmit)="authenticate()">
    <mat-card-content>
      <mat-list role="list" style="text-align: center">
        <mat-list-item role="listitem" style="height: 100px;">
          <mat-form-field appearance="outline">
            <mat-label>Enter username</mat-label>
            <input matInput type="text" name="name" [(ngModel)]="authRequest.username" required>
            <mat-icon matSuffix>account_circle</mat-icon>
          </mat-form-field>
        </mat-list-item>
        <mat-list-item role="listitem" style="height: 100px;">
          <mat-form-field appearance="outline">
            <mat-label>Enter password</mat-label>
            <input matInput type="text" name="password" [(ngModel)]="authRequest.password" minlength="6" required>
            <mat-icon matSuffix>lock</mat-icon>
          </mat-form-field>
        </mat-list-item>
      </mat-list>
    </mat-card-content>
    <mat-card-actions>
      <div style="width:100%; display: flex;  justify-content: space-between;">
        <button mat-raised-button type="submit" [disabled]="!myForm.valid"> Submit </button>
        <button mat-raised-button style="background-color: #b63d52;"> <a routerLink="/register" style="text-decoration: none; color: white;"> Register </a> </button>
      </div>
    </mat-card-actions>
  </form>
</mat-card>
